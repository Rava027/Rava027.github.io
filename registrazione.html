<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Pagina di registrazione per l'area riservata.">
    <title>Registrazione</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1>Registrazione</h1>
        </div>
    </header>
    <main>
        <div class="registration-container">
            <h2>Crea un Account</h2>
            <form action="Area Riservata.html" method="POST">
                <div class="form-group">
                    <label for="username">Nome utente</label>
                    <input type="text" id="username" name="username" placeholder="Inserisci il tuo nome utente" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Inserisci la tua email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Crea una password" required>
                </div>
                <div class="form-group">
                    <label for="confirm-password">Conferma Password</label>
                    <input type="password" id="confirm-password" name="confirm-password" placeholder="Conferma la tua password" required>
                </div>
                <button type="submit" class="register-button">Registrati</button>
            </form>
            <p class="login-link">Hai già un account? <a href="Area Riservata.html">Accedi</a></p>
        </div>
        <div class="back-to-home">
            <button onclick="location.href='pagina 1.html'">🏠 Torna alla Home</button>
        </div>
    </main>
    <footer>
        <p>&copy; 2025 La Storia del Basket</p>
    </footer>
</body>
</html>
